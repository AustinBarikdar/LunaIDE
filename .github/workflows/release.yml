name: Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch: # Allows you to manually trigger a release from the Actions tab

permissions:
  contents: write # Needed to create and publish a GitHub Release

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix: { node-version: [20.x] }
    steps:
    - uses: actions/checkout@v4
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with: { version: 9 }
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'
    - name: Install dependencies
      run: pnpm install
    - name: Build
      run: pnpm build
    - name: Run configure prep script
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: bash fork/scripts/prepare.sh
    - name: Zipping LunaIDE.app
      run: |
        cd ~/LunaIDE-dist
        zip -r LunaIDE-macOS-arm64.zip LunaIDE.app
    - name: Upload macOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-release-zip
        path: ~/LunaIDE-dist/LunaIDE-macOS-arm64.zip

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix: { node-version: [20.x] }
    steps:
    - uses: actions/checkout@v4
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with: { version: 9 }
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'
    - name: Install dependencies
      run: pnpm install
    - name: Build
      run: pnpm build
    - name: Run configure prep script
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: bash fork/scripts/prepare-win.sh
    - name: Zipping LunaIDE
      run: |
        cd ~/LunaIDE-dist-win
        7z a LunaIDE-Windows-x64.zip LunaIDE
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-release-zip
        path: ~/LunaIDE-dist-win/LunaIDE-Windows-x64.zip

  publish-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release-zip
          path: release/macos/
          
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release-zip
          path: release/windows/

      - name: Release Packages
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release/macos/LunaIDE-macOS-arm64.zip
            release/windows/LunaIDE-Windows-x64.zip
          draft: true
          generate_release_notes: true
